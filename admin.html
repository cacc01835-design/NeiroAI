<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель НейроИИ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-container dark-theme">
    <div class="admin-header">
        <h1>Админ-панель НейроИИ</h1>
        <p>Управление чатами пользователей</p>
    </div>

    <div class="admin-content">
        <div class="users-list">
            <h3>Пользователи <span id="users-count">0</span></h3>
            <div id="users"></div>
        </div>

        <div class="chat-view">
            <div id="notifications"></div>

            <div id="chat-history" class="chat-messages"></div>

            <div class="chat-response">
                <textarea id="admin-response" placeholder="Введите ответ..."></textarea>
                <div class="response-controls">
                    <button id="send-response">Отправить</button>
            <button id="clear-history">Очистить историю</button>
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
